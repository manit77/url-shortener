<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>URL Shortener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <style>
        body {
            background:
                radial-gradient(1200px circle at 10% 10%, rgba(13,110,253,.18), transparent 45%),
                radial-gradient(900px circle at 90% 20%, rgba(32,201,151,.18), transparent 50%),
                radial-gradient(900px circle at 50% 100%, rgba(111,66,193,.16), transparent 55%),
                #0b1220;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.16);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }
        .text-muted-2 {
            color: rgba(255, 255, 255, 0.7) !important;
        }
        a {
            word-break: break-all;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.45);
        }
        .form-control, .input-group-text {
            background-color: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.18);
            color: #fff;
        }
        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(13,110,253,.7);
            box-shadow: 0 0 0 .25rem rgba(13,110,253,.2);
            color: #fff;
        }
        .btn-primary {
            box-shadow: 0 10px 24px rgba(13,110,253,.25);
        }
        .badge-soft {
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.18);
        }
        .alert {
            background: rgba(255,255,255,.08);
            border-color: rgba(255,255,255,.18);
            color: #fff;
        }
        .alert a { color: #fff; }
    </style>
</head>
<body>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-9 col-lg-7 col-xl-6">
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <div>
                        <div class="d-flex align-items-center gap-2">
                            <h1 class="h3 mb-0 text-white">URL Shortener</h1>
                            <span class="badge badge-soft text-white-50">/form</span>
                        </div>
                        <div class="text-muted-2 mt-1">Create a short link in seconds. Add an optional custom ID.</div>
                    </div>
                </div>

                <div class="card glass rounded-4 shadow-lg">
                    <div class="card-body p-4 p-md-5">
                        <form id="shortenForm" class="vstack gap-3" onsubmit="return false;">
                            <div>
                                <label for="url" class="form-label text-white">Original URL</label>
                                <div class="input-group">
                                    <span class="input-group-text">🔗</span>
                                    <input id="url" class="form-control" inputmode="url" autocomplete="url"
                                           placeholder="https://example.com/some/very/long/path">
                                </div>
                                <div class="form-text text-muted-2">Must include <code class="text-white">http://</code> or <code class="text-white">https://</code>.</div>
                            </div>

                            <div>
                                <label for="customId" class="form-label text-white">Custom ID <span class="text-muted-2">(optional)</span></label>
                                <div class="input-group">
                                    <span class="input-group-text">✨</span>
                                    <input id="customId" class="form-control" autocomplete="off"
                                           placeholder="e.g. my-link">
                                </div>
                            </div>

                            <div class="d-grid d-sm-flex gap-2">
                                <button id="submitBtn" type="button" class="btn btn-primary btn-lg flex-grow-1" onclick="shorten()">
                                    Shorten URL
                                </button>
                                <button class="btn btn-outline-light btn-lg" onclick="resetForm()" type="button">
                                    Reset
                                </button>
                            </div>
                        </form>

                        <div id="result" class="mt-4"></div>
                    </div>
                </div>

                <div class="text-muted-2 small mt-3">
                    Tip: open the generated short URL in a new tab to test redirects.
                </div>
            </div>
        </div>
    </main>

    <script>
        const resultDiv = document.getElementById("result");
        const urlInput = document.getElementById("url");
        const customIdInput = document.getElementById("customId");
        const submitBtn = document.getElementById("submitBtn");

        document.getElementById("shortenForm").addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                shorten();
            }
        });

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            submitBtn.innerHTML = isLoading
                ? `<span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>Working...`
                : `Shorten URL`;
        }

        function showAlert(type, html) {
            const cls = type === "success" ? "alert-success" : (type === "warning" ? "alert-warning" : "alert-danger");
            resultDiv.innerHTML = `<div class="alert ${cls} rounded-3 mb-0" role="alert">${html}</div>`;
        }

        function resetForm() {
            urlInput.value = "";
            customIdInput.value = "";
            resultDiv.innerHTML = "";
            urlInput.focus();
        }

        async function shorten() {
            const url = urlInput.value.trim();
            const id = customIdInput.value.trim();

            if (!url) {
                showAlert("warning", "Please enter a URL to shorten.");
                urlInput.focus();
                return;
            }

            setLoading(true);
            showAlert("warning", "Generating your short link...");

            try {
                const response = await fetch("/shorten", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url, id })
                });

                const data = await response.json();

                if (!response.ok) {
                    showAlert("danger", `<strong>Oops.</strong> ${data?.error || "Request failed."}`);
                    return;
                }

                const safeOriginal = String(data.original || "").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
                showAlert(
                    "success",
                    `
                        <div class="d-flex align-items-start justify-content-between gap-3">
                            <div>
                                <div class="fw-semibold mb-2">Short URL created</div>
                                <div class="mb-2">
                                    <div class="text-muted-2 small mb-1">Short</div>
                                    <a class="link-light fw-semibold" href="${data.short}" target="_blank" rel="noreferrer">${data.short}</a>
                                </div>
                                <div class="mb-0">
                                    <div class="text-muted-2 small mb-1">Original</div>
                                    <div>${safeOriginal}</div>
                                </div>
                                <div class="mt-3">
                                    <span class="badge text-bg-light">ID: ${data.id}</span>
                                </div>
                            </div>
                            <div class="d-grid gap-2">
                                <button class="btn btn-light btn-sm" type="button" onclick="navigator.clipboard.writeText('${data.short}')">
                                    Copy link
                                </button>
                                <a class="btn btn-outline-light btn-sm" href="${data.short}" target="_blank" rel="noreferrer">
                                    Open
                                </a>
                            </div>
                        </div>
                    `
                );
            } catch (e) {
                showAlert("danger", "<strong>Network error.</strong> Please try again.");
            } finally {
                setLoading(false);
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
</body>
</html>
